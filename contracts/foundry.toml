[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"

# Optimizer for production deployments
optimizer = true
optimizer_runs = 200

# Gas reporting
gas_reports = ["TaskEscrow", "WorkerRegistry"]

[fuzz]
runs = 256

[rpc_endpoints]
monad_testnet = "${MONAD_RPC_URL}"

[etherscan]
monad_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${MONAD_EXPLORER_API_URL}" }
